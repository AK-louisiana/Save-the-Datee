<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Save the Date — Ashish & Lauren</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    min-height: 100vh;
    background: #0a0005;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }
  .card {
    width: 100vw;
    max-width: 420px;
    height: 100vh;
    max-height: 820px;
    position: relative;
    overflow: hidden;
    background: #100008;
    box-shadow: 0 0 80px rgba(120,0,40,0.5);
  }

  /* Photo */
  .photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 15%;
    filter: brightness(0.82) saturate(0.95);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(8,0,4,0.08) 0%,
      rgba(8,0,4,0.0) 20%,
      rgba(8,0,4,0.3) 50%,
      rgba(8,0,4,0.95) 100%
    );
  }

  /* Petal canvas */
  #petalCanvas {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
  }

  /* Particle canvas */
  #particleCanvas {
    position: absolute;
    inset: 0;
    z-index: 7;
    pointer-events: none;
  }

  /* Top valance */
  .valance {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: #7a0a1e;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 2px solid #c89535;
  }
  .valance-text {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 6px;
    color: #c89535;
    text-transform: uppercase;
  }
  .vdiamond {
    width: 5px; height: 5px;
    background: #c89535;
    transform: rotate(45deg);
    margin: 0 14px;
    flex-shrink: 0;
  }

  /* Curtains */
  .curtains {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    z-index: 15;
    pointer-events: none;
  }
  .curtain-left, .curtain-right {
    width: 50%;
    height: 100%;
    background: #7a0a1e;
    position: relative;
    overflow: hidden;
    transition: transform 1.6s cubic-bezier(0.77,0,0.175,1);
  }
  .curtain-left::before { content:''; position:absolute; top:0;bottom:0; left:20%; width:16px; background:rgba(0,0,0,0.18); }
  .curtain-left::after  { content:''; position:absolute; top:0;bottom:0; left:55%; width:10px; background:rgba(0,0,0,0.12); }
  .curtain-right::before{ content:''; position:absolute; top:0;bottom:0; right:20%; width:16px; background:rgba(0,0,0,0.18); }
  .curtain-right::after { content:''; position:absolute; top:0;bottom:0; right:55%; width:10px; background:rgba(0,0,0,0.12); }
  .curtain-left .trim { position:absolute; top:0;right:0;bottom:0; width:4px; background:linear-gradient(to bottom,#c89535,#7a5010,#c89535); }
  .curtain-right .trim{ position:absolute; top:0;left:0;bottom:0;  width:4px; background:linear-gradient(to bottom,#c89535,#7a5010,#c89535); }
  .curtains.open .curtain-left  { transform: translateX(-105%); }
  .curtains.open .curtain-right { transform: translateX(105%); }

  /* Rope */
  .rope { position:absolute; top:50px; left:50%; transform:translateX(-50%); width:2px; height:56px; background:linear-gradient(to bottom,#c89535,#7a5010); z-index:25; }
  .rope-knot { position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:18px;height:18px; border-radius:50%; background:radial-gradient(circle at 40% 35%,#e0aa45,#8b6020); border:1.5px solid #7a5010; }

  /* Pull button */
  .pull-btn-wrapper {
    position:absolute; inset:0; z-index:30;
    display:flex; align-items:flex-end; justify-content:center;
    padding-bottom:48px;
  }
  .pull-btn {
    background:transparent;
    border:1.5px solid #c89535;
    color:#c89535;
    font-family:'Cinzel',serif;
    font-size:10px;
    letter-spacing:3px;
    padding:14px 32px;
    cursor:pointer;
    text-transform:uppercase;
    transition:background 0.3s,color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .pull-btn:hover, .pull-btn:active { background:rgba(200,149,53,0.18); color:#e8c870; }

  /* Content */
  .content {
    position:absolute;
    bottom:0; left:0; right:0;
    z-index:8;
    padding: 0 28px 30px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .tag { opacity:0; transform:translateY(16px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .tag.show { opacity:1; transform:translateY(0); }

  .save-label { font-style:italic; font-size:14px; letter-spacing:4px; color:#c89535; margin-bottom:6px; transition-delay:1.1s; }
  .couple-names { font-size:52px; font-weight:300; color:#fff; line-height:1; text-align:center; margin-bottom:8px; transition-delay:1.3s; }
  .amp { font-style:italic; color:#c89535; }
  .divider { display:flex; align-items:center; gap:10px; width:100%; margin-bottom:10px; transition-delay:1.5s; }
  .divider-line { flex:1; height:1px; background:rgba(200,149,53,0.35); }
  .divider-diamond { width:6px;height:6px; background:#c89535; transform:rotate(45deg); flex-shrink:0; }
  .location { font-style:italic; font-size:15px; letter-spacing:2px; color:#b89870; margin-bottom:22px; transition-delay:1.6s; }

  /* Scratch */
  .scratch-wrapper { width:100%; transition-delay:1.8s; }
  .scratch-hint { font-style:italic; font-size:11px; letter-spacing:2px; color:#8a6840; text-align:center; margin-bottom:8px; }
  .scratch-container { position:relative; width:100%; height:72px; border-radius:3px; overflow:hidden; cursor:crosshair; }
  .scratch-reveal {
    position:absolute; inset:0;
    background:#0e0008;
    border:1px solid rgba(200,149,53,0.3);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px;
  }
  .reveal-date { font-family:'Cinzel',serif; font-size:26px; font-weight:600; color:#c89535; letter-spacing:4px; }
  .reveal-sub  { font-style:italic; font-size:13px; color:#b09060; letter-spacing:2px; }
  canvas#scratchCanvas { position:absolute; inset:0; touch-action:none; }

  /* Music button */
  .music-btn {
    position:absolute; top:58px; right:14px; z-index:35;
    width:36px; height:36px; border-radius:50%;
    background:rgba(122,10,30,0.85);
    border:1.5px solid #c89535;
    color:#c89535; font-size:16px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: background 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .music-btn:hover { background:rgba(200,149,53,0.2); }
</style>
</head>
<body>
<div class="card" id="card">

  <div class="photo-bg" id="photoBg"></div>
  <div class="overlay"></div>

  <!-- Canvases -->
  <canvas id="petalCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>

  <!-- Valance -->
  <div class="valance">
    <div class="vdiamond"></div>
    <span class="valance-text">Save the Date</span>
    <div class="vdiamond"></div>
  </div>

  <!-- Music toggle -->
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Toggle music">♪</button>

  <!-- Rope -->
  <div class="rope"><div class="rope-knot"></div></div>

  <!-- Curtains -->
  <div class="curtains" id="curtains">
    <div class="curtain-left"><div class="trim"></div></div>
    <div class="curtain-right"><div class="trim"></div></div>
  </div>

  <!-- Pull button -->
  <div class="pull-btn-wrapper" id="pullWrapper">
    <button class="pull-btn" onclick="openCurtains()">✦ &nbsp; Pull the Curtains &nbsp; ✦</button>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="tag save-label">Save the Date</div>
    <div class="tag couple-names">Ashish <span class="amp">&amp;</span> Lauren</div>
    <div class="tag divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <div class="tag location">Louisiana</div>
    <div class="tag scratch-wrapper" id="scratchWrapper">
      <div class="scratch-hint">— scratch below to reveal the date —</div>
      <div class="scratch-container" id="scratchContainer">
        <div class="scratch-reveal">
          <div class="reveal-date">02 · 13 · 2027</div>
          <div class="reveal-sub">February 13th, 2027</div>
        </div>
        <canvas id="scratchCanvas"></canvas>
      </div>
    </div>
  </div>

</div>

    {freq: 293.7, time: 1.2, dur: 0.8},
    {freq: 329.6, time: 2.0, dur: 1.5},
    {freq: 392.0, time: 3.5, dur: 1.0},
    {freq: 349.2, time: 4.5, dur: 0.8},
    {freq: 329.6, time: 5.3, dur: 1.2},
    {freq: 293.7, time: 6.5, dur: 2.0},
    {freq: 261.6, time: 8.5, dur: 1.5},
    {freq: 220.0, time: 10.0,dur: 1.2},
    {freq: 246.9, time: 11.2,dur: 0.8},
    {freq: 261.6, time: 12.0,dur: 3.0},
  ];

  const now = audioCtx.currentTime;
  melody.forEach(note => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(note.freq, now + note.time);
    g.gain.setValueAtTime(0, now + note.time);
    g.gain.linearRampToValueAtTime(0.3, now + note.time + 0.1);
    g.gain.linearRampToValueAtTime(0, now + note.time + note.dur);
    osc.connect(g);
    g.connect(gainNode);
    osc.start(now + note.time);
    osc.stop(now + note.time + note.dur + 0.1);
    oscillators.push(osc);
  });
}

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (!audioCtx) {
    createRomanticMusic();
    musicPlaying = true;
    btn.textContent = '♫';
    btn.style.color = '#e8c870';
  } else if (musicPlaying) {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    musicPlaying = false;
    btn.textContent = '♪';
    btn.style.color = '#c89535';
  } else {
    createRomanticMusic();
    musicPlaying = true;
    btn.textContent = '♫';
    btn.style.color = '#e8c870';
  }
}

// ── Petals ─────────────────────────────────────────
const petalCanvas = document.getElementById('petalCanvas');
const pCtx = petalCanvas.getContext('2d');
let petals = [], petalActive = false;

function resizeCanvases() {
  const w = card.offsetWidth, h = card.offsetHeight;
  petalCanvas.width = w; petalCanvas.height = h;
  particleCanvas.width = w; particleCanvas.height = h;
}

function createPetal() {
  const w = petalCanvas.width;
  return {
    x: Math.random() * w,
    y: -20,
    size: 8 + Math.random() * 10,
    speedY: 1.2 + Math.random() * 1.8,
    speedX: (Math.random() - 0.5) * 1.2,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.08,
    opacity: 0.6 + Math.random() * 0.4,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.02 + Math.random() * 0.02,
    color: Math.random() > 0.5 ? '#e8556a' : '#c4294d'
  };
}

function drawPetal(p) {
  pCtx.save();
  pCtx.globalAlpha = p.opacity;
  pCtx.translate(p.x, p.y);
  pCtx.rotate(p.rotation);
  pCtx.beginPath();
  pCtx.ellipse(0, 0, p.size * 0.45, p.size * 0.7, 0, 0, Math.PI * 2);
  pCtx.fillStyle = p.color;
  pCtx.fill();
  // shine
  pCtx.beginPath();
  pCtx.ellipse(-p.size*0.1, -p.size*0.15, p.size*0.12, p.size*0.2, -0.3, 0, Math.PI*2);
  pCtx.fillStyle = 'rgba(255,255,255,0.25)';
  pCtx.fill();
  pCtx.restore();
}

function animatePetals() {
  if (!petalActive) return;
  pCtx.clearRect(0, 0, petalCanvas.width, petalCanvas.height);
  const h = petalCanvas.height;

  if (petals.length < 28 && Math.random() < 0.3) petals.push(createPetal());

  petals = petals.filter(p => p.y < h + 30);
  petals.forEach(p => {
    p.sway += p.swaySpeed;
    p.x += p.speedX + Math.sin(p.sway) * 0.8;
    p.y += p.speedY;
    p.rotation += p.rotSpeed;
    drawPetal(p);
  });
  requestAnimationFrame(animatePetals);
}

// ── Particles ──────────────────────────────────────
const particleCanvas = document.getElementById('particleCanvas');
const partCtx = particleCanvas.getContext('2d');
let particles = [], particleActive = false;

function createParticle() {
  const w = particleCanvas.width, h = particleCanvas.height;
  return {
    x: Math.random() * w,
    y: Math.random() * h,
    size: 1 + Math.random() * 2.5,
    speedY: -(0.3 + Math.random() * 0.8),
    speedX: (Math.random() - 0.5) * 0.4,
    opacity: 0,
    maxOpacity: 0.5 + Math.random() * 0.5,
    life: 0,
    maxLife: 80 + Math.random() * 80,
    color: Math.random() > 0.5 ? '#c89535' : '#e8d080'
  };
}

function animateParticles() {
  if (!particleActive) return;
  partCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  if (particles.length < 45 && Math.random() < 0.4) particles.push(createParticle());

  particles = particles.filter(p => p.life < p.maxLife);
  particles.forEach(p => {
    p.life++;
    p.x += p.speedX;
    p.y += p.speedY;
    const lifeRatio = p.life / p.maxLife;
    p.opacity = lifeRatio < 0.2
      ? (lifeRatio / 0.2) * p.maxOpacity
      : lifeRatio > 0.7
        ? ((1 - lifeRatio) / 0.3) * p.maxOpacity
        : p.maxOpacity;

    partCtx.save();
    partCtx.globalAlpha = p.opacity;
    partCtx.beginPath();
    // 4-pointed star shape
    const s = p.size;
    partCtx.moveTo(p.x, p.y - s*2);
    partCtx.lineTo(p.x + s*0.4, p.y - s*0.4);
    partCtx.lineTo(p.x + s*2, p.y);
    partCtx.lineTo(p.x + s*0.4, p.y + s*0.4);
    partCtx.lineTo(p.x, p.y + s*2);
    partCtx.lineTo(p.x - s*0.4, p.y + s*0.4);
    partCtx.lineTo(p.x - s*2, p.y);
    partCtx.lineTo(p.x - s*0.4, p.y - s*0.4);
    partCtx.closePath();
    partCtx.fillStyle = p.color;
    partCtx.fill();
    partCtx.restore();
  });
  requestAnimationFrame(animateParticles);
}

// ── Curtain open ───────────────────────────────────
function openCurtains() {
  document.getElementById('curtains').classList.add('open');
  document.getElementById('pullWrapper').style.display = 'none';

  setTimeout(() => {
    document.querySelectorAll('.tag').forEach(el => el.classList.add('show'));
  }, 800);

  setTimeout(initScratch, 2600);

  // Start petals & particles
  petalActive = true;
  particleActive = true;
  animatePetals();
  animateParticles();
}

// ── Scratch ────────────────────────────────────────
function initScratch() {
  const container = document.getElementById('scratchContainer');
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  const w = container.offsetWidth, h = container.offsetHeight;
  canvas.width = w; canvas.height = h;

  ctx.fillStyle = '#7a0a1e';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 55; i++) {
    ctx.strokeStyle = `rgba(${110+Math.random()*60},${8+Math.random()*20},${25+Math.random()*20},0.4)`;
    ctx.lineWidth = Math.random() * 2;
    ctx.beginPath();
    const x = Math.random() * w;
    ctx.moveTo(x, 0);
    ctx.lineTo(x + (Math.random()-0.5)*30, h);
    ctx.stroke();
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#c89535';
  ctx.font = '600 11px Cinzel, serif';
  ctx.fillText('✦  SCRATCH TO REVEAL  ✦', w/2, h/2);

  let painting = false;
  function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }
  function scratch(e) {
    e.preventDefault();
    if (!painting) return;
    const {x,y} = getXY(e);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 26, 0, Math.PI*2);
    ctx.fill();
    const data = ctx.getImageData(0,0,w,h).data;
    let transparent = 0;
    for (let i = 3; i < data.length; i+=4) { if (data[i] < 100) transparent++; }
    if (transparent / (w*h) > 0.58) ctx.clearRect(0,0,w,h);
  }
  canvas.addEventListener('mousedown', e => { painting=true; scratch(e); });
  canvas.addEventListener('mousemove', e => { if(painting) scratch(e); });
  canvas.addEventListener('mouseup', () => painting=false);
  canvas.addEventListener('mouseleave', () => painting=false);
  canvas.addEventListener('touchstart', e => { painting=true; scratch(e); }, {passive:false});
  canvas.addEventListener('touchmove', scratch, {passive:false});
  canvas.addEventListener('touchend', () => painting=false);
}

// ── Init ───────────────────────────────────────────
window.addEventListener('load', () => { resizeCanvases(); });
window.addEventListener('resize', resizeCanvases);
</script>
