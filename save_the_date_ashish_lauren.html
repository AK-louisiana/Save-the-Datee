<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Save the Date — Ashish & Lauren</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    min-height: 100vh;
    background: #0a0005;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }
  .card {
    width: 390px;
    height: 700px;
    position: relative;
    overflow: hidden;
    background: #100008;
    box-shadow: 0 0 80px rgba(120,0,40,0.5);
  }

  /* Photo background */
  .photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 20%;
    filter: brightness(0.5) saturate(0.8);
  }

  /* Dark gradient overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(8,0,4,0.15) 0%,
      rgba(8,0,4,0.05) 25%,
      rgba(8,0,4,0.45) 55%,
      rgba(8,0,4,0.97) 100%
    );
  }

  /* Top valance bar */
  .valance {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: #7a0a1e;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 2px solid #c89535;
  }
  .valance-text {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: #c89535;
    text-transform: uppercase;
  }
  .valance-diamond {
    width: 5px; height: 5px;
    background: #c89535;
    transform: rotate(45deg);
    margin: 0 12px;
  }

  /* Curtains */
  .curtains {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    z-index: 15;
    pointer-events: none;
  }
  .curtain-left, .curtain-right {
    width: 50%;
    height: 100%;
    background: #7a0a1e;
    position: relative;
    overflow: hidden;
    transition: transform 1.5s cubic-bezier(0.77,0,0.175,1);
  }
  .curtain-left::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 18%;
    width: 14px;
    background: rgba(0,0,0,0.2);
  }
  .curtain-left::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 52%;
    width: 10px;
    background: rgba(0,0,0,0.15);
  }
  .curtain-right::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    right: 18%;
    width: 14px;
    background: rgba(0,0,0,0.2);
  }
  .curtain-right::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    right: 52%;
    width: 10px;
    background: rgba(0,0,0,0.15);
  }
  /* Gold edge trim on curtains */
  .curtain-left .trim {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, #c89535, #8b6020, #c89535);
  }
  .curtain-right .trim {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, #c89535, #8b6020, #c89535);
  }
  /* Curtain scalloped bottom */
  .curtain-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    overflow: hidden;
  }

  .curtains.open .curtain-left { transform: translateX(-105%); }
  .curtains.open .curtain-right { transform: translateX(105%); }

  /* Rope */
  .rope {
    position: absolute;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 54px;
    background: linear-gradient(to bottom, #c89535, #7a5010);
    z-index: 25;
  }
  .rope-knot {
    position: absolute;
    bottom: -9px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #e0aa45, #8b6020);
    border: 1.5px solid #7a5010;
  }

  /* Pull button */
  .pull-btn-wrapper {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 44px;
  }
  .pull-btn {
    background: transparent;
    border: 1.5px solid #c89535;
    color: #c89535;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    padding: 12px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.3s, color 0.3s;
  }
  .pull-btn:hover, .pull-btn:active {
    background: rgba(200,149,53,0.18);
    color: #e8c870;
  }

  /* Revealed content */
  .content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 0 30px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tag { opacity: 0; transform: translateY(14px); transition: all 0.8s ease; }
  .tag.show { opacity: 1; transform: translateY(0); }

  .save-label {
    font-style: italic;
    font-size: 13px;
    letter-spacing: 4px;
    color: #c89535;
    margin-bottom: 4px;
    transition-delay: 1.2s;
  }
  .the-date {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 6px;
    color: #ddc898;
    margin-bottom: 16px;
    transition-delay: 1.4s;
  }
  .couple-names {
    font-size: 50px;
    font-weight: 300;
    color: #fff;
    line-height: 1;
    text-align: center;
    margin-bottom: 6px;
    transition-delay: 1.6s;
  }
  .amp { font-style: italic; color: #c89535; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin-bottom: 8px;
    transition-delay: 1.7s;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(200,149,53,0.35); }
  .divider-diamond { width: 5px; height: 5px; background: #c89535; transform: rotate(45deg); flex-shrink: 0; }
  .location {
    font-style: italic;
    font-size: 14px;
    letter-spacing: 2px;
    color: #b89870;
    margin-bottom: 24px;
    transition-delay: 1.9s;
  }

  /* Scratch area */
  .scratch-wrapper {
    width: 100%;
    transition-delay: 2.1s;
  }
  .scratch-hint {
    font-style: italic;
    font-size: 11px;
    letter-spacing: 2px;
    color: #8a6840;
    text-align: center;
    margin-bottom: 8px;
  }
  .scratch-container {
    position: relative;
    width: 100%;
    height: 66px;
    border-radius: 3px;
    overflow: hidden;
    cursor: crosshair;
  }
  .scratch-reveal {
    position: absolute;
    inset: 0;
    background: #100008;
    border: 1px solid rgba(200,149,53,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .reveal-date {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    font-weight: 600;
    color: #c89535;
    letter-spacing: 4px;
  }
  .reveal-sub {
    font-style: italic;
    font-size: 12px;
    color: #b09060;
    letter-spacing: 2px;
  }
  canvas#scratchCanvas {
    position: absolute;
    inset: 0;
    touch-action: none;
  }
</style>
</head>
<body>
<div class="card" id="card">

  <!-- Photo -->
  <div class="photo-bg" id="photoBg"></div>
  <div class="overlay"></div>

  <!-- Top valance -->
  <div class="valance">
    <div class="valance-diamond"></div>
    <span class="valance-text">Save the Date</span>
    <div class="valance-diamond"></div>
  </div>

  <!-- Rope & knot -->
  <div class="rope"><div class="rope-knot"></div></div>

  <!-- Curtains -->
  <div class="curtains" id="curtains">
    <div class="curtain-left"><div class="trim"></div></div>
    <div class="curtain-right"><div class="trim"></div></div>
  </div>

  <!-- Pull button (over curtains) -->
  <div class="pull-btn-wrapper" id="pullWrapper">
    <button class="pull-btn" onclick="openCurtains()">✦ &nbsp; Pull the Curtains &nbsp; ✦</button>
  </div>

  <!-- Content behind curtains -->
  <div class="content" id="content">
    <div class="tag save-label">Save the Date</div>
    <div class="tag the-date">FEBRUARY 13, 2027</div>
    <div class="tag couple-names">Ashish <span class="amp">&amp;</span> Lauren</div>
    <div class="tag divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <div class="tag location">Louisiana</div>
    <div class="tag scratch-wrapper" id="scratchWrapper">
      <div class="scratch-hint">— scratch below to reveal the date —</div>
      <div class="scratch-container" id="scratchContainer">
        <div class="scratch-reveal">
          <div class="reveal-date">02 · 13 · 2027</div>
          <div class="reveal-sub">February 13th, 2027</div>
        </div>
        <canvas id="scratchCanvas"></canvas>
      </div>
    </div>
  </div>

</div>

function openCurtains() {
  document.getElementById('curtains').classList.add('open');
  document.getElementById('pullWrapper').style.display = 'none';
  // Show content elements after curtain opens
  setTimeout(() => {
    document.querySelectorAll('.tag').forEach(el => el.classList.add('show'));
  }, 700);
  setTimeout(initScratch, 2500);
}

function initScratch() {
  const container = document.getElementById('scratchContainer');
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  const w = container.offsetWidth;
  const h = container.offsetHeight;
  canvas.width = w;
  canvas.height = h;

  // Draw scratch surface
  ctx.fillStyle = '#7a0a1e';
  ctx.fillRect(0, 0, w, h);

  // Texture lines
  for (let i = 0; i < 50; i++) {
    ctx.strokeStyle = `rgba(${120 + Math.random()*60},${10 + Math.random()*20},${30 + Math.random()*20},0.4)`;
    ctx.lineWidth = Math.random() * 2;
    ctx.beginPath();
    const x = Math.random() * w;
    ctx.moveTo(x, 0);
    ctx.lineTo(x + (Math.random()-0.5)*30, h);
    ctx.stroke();
  }

  // Gold foil text
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#c89535';
  ctx.font = 'bold 11px Cinzel, serif';
  ctx.fillText('✦  SCRATCH TO REVEAL  ✦', w/2, h/2);

  let painting = false;

  function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function scratch(e) {
    e.preventDefault();
    if (!painting) return;
    const {x, y} = getXY(e);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 24, 0, Math.PI * 2);
    ctx.fill();
    checkCompletion();
  }

  function checkCompletion() {
    const data = ctx.getImageData(0, 0, w, h).data;
    let transparent = 0;
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] < 100) transparent++;
    }
    if (transparent / (w * h) > 0.6) {
      ctx.clearRect(0, 0, w, h);
    }
  }

  canvas.addEventListener('mousedown', e => { painting = true; scratch(e); });
  canvas.addEventListener('mousemove', e => { if (painting) scratch(e); });
  canvas.addEventListener('mouseup', () => painting = false);
  canvas.addEventListener('mouseleave', () => painting = false);
  canvas.addEventListener('touchstart', e => { painting = true; scratch(e); }, {passive: false});
  canvas.addEventListener('touchmove', e => { scratch(e); }, {passive: false});
  canvas.addEventListener('touchend', () => painting = false);
}
